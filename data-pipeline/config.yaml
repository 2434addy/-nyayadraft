# NyayaDraft data pipeline configuration.
# Edit counts/model/pricing here — no code changes needed.

generation:
  model: claude-sonnet-4-6
  temperature: 0.9
  max_tokens: 8192           # cap, not a target: long doc types (leave_license,
                             # consumer_complaint, partnership_deed) need headroom to
                             # emit the full JSON without truncation -> parse_error.
                             # Cost-neutral for short docs (billed per generated token);
                             # the cost guard estimates spend from est_output_tokens.
  use_batch_api: true        # Batches API = 50% cheaper; --sample and --retry always run sync
  est_input_tokens: 1900     # per-request estimates used by the cost guard
  est_output_tokens: 2300

pricing:
  usd_per_mtok_input: 3.0    # Sonnet 4.6 list price
  usd_per_mtok_output: 15.0
  batch_discount: 0.5
  usd_to_inr: 88.0

counts:
  default_per_type: 500      # fallback for any type not listed in per_type below
  out_of_scope: 250          # fallback for the refusal category when not in per_type
  pilot_per_type: 30         # --pilot generates this many for EVERY type incl. out_of_scope
  per_type:                  # complexity-weighted 1,000-doc distribution (full mode)
    partnership_deed_1932: 120          # most complex: multi-clause deed, 2-3 partners
    consumer_complaint_cpa2019: 120     # most complex: pleading + jurisdiction + prayer
    cheque_bounce_138: 100              # legal notice
    legal_notice_money_recovery: 100    # legal notice
    legal_notice_landlord_tenant: 100   # legal notice
    reply_to_legal_notice: 95           # legal notice (reply)
    leave_license_mh: 90                # long agreement
    employment_offer_termination: 80    # offer/termination letter
    mou_two_parties: 75                 # agreement
    affidavit_general: 70               # simpler, formulaic
    out_of_scope: 50                    # refusal (~5%); fewer, but keeps refusal coverage
                                        # total = 1000

sample_max: 10               # any API run larger than this requires typing YES (cost guard)

splits: { train: 0.80, val: 0.10, test: 0.10 }   # held out BY SCENARIO — no leakage
review_sample_fraction: 0.05                      # full runs: random 5% flagged for lawyer CSV

registers:                   # instruction style mix
  casual: 0.40
  semi_formal: 0.35
  detailed: 0.25

withhold_probability:        # chance each withholdable field is withheld from the user request
  casual: 0.70
  semi_formal: 0.50
  detailed: 0.30

dedup:
  similarity_threshold: 92   # rapidfuzz token_set_ratio on normalized instructions

seed: 20260610

doc_types:
  - leave_license_mh
  - legal_notice_money_recovery
  - legal_notice_landlord_tenant
  - cheque_bounce_138
  - consumer_complaint_cpa2019
  - affidavit_general
  - employment_offer_termination
  - mou_two_parties
  - partnership_deed_1932
  - reply_to_legal_notice
  - out_of_scope
